<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LED Chroma">
<title>LED Chroma Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0a0f;color:#fff;
  padding:16px;padding-top:env(safe-area-inset-top,20px);
  padding-bottom:env(safe-area-inset-bottom,20px)}
h1{font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.sub{font-size:12px;color:#444;margin-bottom:20px}

/* Section labels */
.lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:#555;margin:20px 0 8px}

/* Device list */
.dev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.dev-item{display:flex;align-items:center;gap:10px;
  background:#13131f;border:1.5px solid #2a2a3a;border-radius:12px;padding:10px 12px;
  transition:border-color .15s}
.dev-item.selected{border-color:#5e5ce6;background:#1c1c3a}
.dev-item.all-selected{border-color:#30d158;background:#0d1f12}
.dev-check{width:20px;height:20px;border-radius:50%;border:2px solid #333;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.dev-item.selected .dev-check{border-color:#5e5ce6;background:#5e5ce6}
.dev-item.all-selected .dev-check{border-color:#30d158;background:#30d158}
.dev-check::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;opacity:0}
.dev-item.selected .dev-check::after,.dev-item.all-selected .dev-check::after{opacity:1}
.dev-info{flex:1}
.dev-name{font-size:14px;font-weight:600;color:#fff}
.dev-ip{font-size:11px;color:#555;margin-top:1px}
.dev-status{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0}
.dev-status.on{background:#30d158}
.dev-status.err{background:#ff453a}
.dev-actions{display:flex;gap:6px}
.dev-btn{padding:5px 8px;border-radius:7px;border:1px solid #2a2a3a;
  background:transparent;color:#666;font-size:11px;cursor:pointer}
.dev-btn:active{background:#2a2a3a}

/* Add device */
.add-row{display:flex;gap:8px;margin-top:8px}
.add-row input{flex:1;background:#13131f;border:1.5px solid #2a2a3a;border-radius:10px;
  color:#fff;font-size:13px;padding:10px 12px;outline:none}
.add-row input::placeholder{color:#444}
.add-btn{padding:10px 14px;border-radius:10px;border:none;
  background:#5e5ce6;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:active{opacity:.8}

/* Selection summary */
.sel-bar{background:#13131f;border:1.5px solid #2a2a3a;border-radius:10px;
  padding:10px 14px;font-size:12px;color:#666;margin-bottom:4px;text-align:center}
.sel-bar span{color:#5e5ce6;font-weight:600}

/* Mode buttons */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:16px 8px;border-radius:14px;border:1.5px solid #2a2a3a;background:#13131f;
  color:#888;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mb .ic{font-size:22px;display:block;margin-bottom:4px}
.mb.on{border-color:#5e5ce6;background:#1c1c3a;color:#fff}
.mb:active{transform:scale(.97)}

/* Brightness */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sv{font-size:13px;color:#5e5ce6;font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;
  background:linear-gradient(to right,#5e5ce6 0%,#5e5ce6 var(--v,100%),#2a2a3a var(--v,100%));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;
  border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5)}

/* Quick buttons */
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qb{padding:12px;border-radius:12px;border:1.5px solid #2a2a3a;background:#13131f;
  color:#aaa;font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.qb:active{background:#1c1c2e;transform:scale(.97)}
.qs{font-size:10px;color:#555;margin-top:2px}

/* Palette */
.pal-box{background:#13131f;border:1.5px solid #2a2a3a;border-radius:14px;padding:14px}
.pal-row{display:flex;gap:8px;margin-bottom:12px}
.pal-row:last-child{margin-bottom:0}
.pc{flex:1;text-align:center}
.pc-label{font-size:10px;color:#555;margin-bottom:6px}
.pc input[type=color]{width:100%;height:40px;border:none;border-radius:8px;
  cursor:pointer;background:none;padding:0}

/* Edit modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#13131f;border:1.5px solid #2a2a3a;border-radius:16px;
  padding:20px;width:100%;max-width:340px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;background:#0a0a0f;border:1.5px solid #2a2a3a;border-radius:8px;
  color:#fff;font-size:14px;padding:10px 12px;margin-bottom:10px;outline:none}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns button{flex:1;padding:11px;border-radius:10px;border:none;
  font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{background:#2a2a3a;color:#aaa}
.btn-save{background:#5e5ce6;color:#fff}
.btn-delete{background:#3a1010;color:#ff453a}
</style>
</head>
<body>

<h1>LED Chroma</h1>
<div class="sub">Contrôle multi-ESP32</div>

<!-- Device list -->
<div class="lbl">Unités</div>
<div class="dev-list" id="dev-list"></div>

<div class="add-row">
  <input type="text" id="new-name" placeholder="Nom (ex: Scène gauche)">
  <input type="text" id="new-ip" placeholder="IP (ex: 192.168.1.27)" style="max-width:160px">
  <button class="add-btn" onclick="addDevice()">+</button>
</div>

<!-- Selection summary -->
<div class="lbl">Cibles sélectionnées</div>
<div class="sel-bar" id="sel-bar">Aucune unité sélectionnée</div>

<!-- Mode -->
<div class="lbl">Mode</div>
<div class="modes">
  <button class="mb on" id="m0" onclick="setMode(0)"><span class="ic">🥁</span>BPM</button>
  <button class="mb" id="m1" onclick="setMode(1)"><span class="ic">🎨</span>Chroma</button>
  <button class="mb" id="m2" onclick="setMode(2)"><span class="ic">🎵</span>YIN f0</button>
  <button class="mb" id="m3" onclick="setMode(3)"><span class="ic">🎤</span>Auto R&B</button>
</div>

<!-- Brightness -->
<div class="lbl">Brightness</div>
<div class="sh"><span></span><span class="sv" id="bv">100%</span></div>
<input type="range" id="bri" min="0" max="100" value="100" oninput="onBri(this.value)">

<!-- Quick -->
<div class="lbl">Raccourcis</div>
<div class="qg">
  <button class="qb" onclick="sendBri(1.0)">Plein feu<div class="qs">100%</div></button>
  <button class="qb" onclick="sendBri(0.0)">Off<div class="qs">0%</div></button>
  <button class="qb" onclick="sendBri(0.5)">Mi-lumi<div class="qs">50%</div></button>
  <button class="qb" onclick="sendBri(0.15)">Ambiance<div class="qs">15%</div></button>
</div>

<!-- Palette -->
<div class="lbl">Palette Auto R&B</div>
<div class="pal-box">
  <div style="font-size:11px;color:#666;margin-bottom:10px">Vocal wash — 3 couleurs</div>
  <div class="pal-row">
    <div class="pc"><div class="pc-label">C1</div>
      <input type="color" id="vc0" value="#0064ff" onchange="sendColor('vc0',this.value)"></div>
    <div class="pc"><div class="pc-label">C2</div>
      <input type="color" id="vc1" value="#b400ff" onchange="sendColor('vc1',this.value)"></div>
    <div class="pc"><div class="pc-label">C3</div>
      <input type="color" id="vc2" value="#00dcb4" onchange="sendColor('vc2',this.value)"></div>
  </div>
  <div class="pal-row">
    <div class="pc"><div class="pc-label">808 Kick</div>
      <input type="color" id="c808" value="#ffdcb4" onchange="sendColor('c808',this.value)"></div>
    <div class="pc"><div class="pc-label">Hi-hat</div>
      <input type="color" id="chat" value="#ffb41e" onchange="sendColor('chat',this.value)"></div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Modifier l'unité</h2>
    <input type="text" id="edit-name" placeholder="Nom">
    <input type="text" id="edit-ip" placeholder="IP">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-delete" onclick="deleteDevice()">Supprimer</button>
      <button class="btn-save" onclick="saveDevice()">Sauver</button>
    </div>
  </div>
</div>

<script>
// ── Storage ───────────────────────────────────────────────────
const STORAGE_KEY = 'led_chroma_devices';

let devices = [];
let selected = new Set(); // indices sélectionnés
let editIndex = -1;
let curMode = 0;

function loadDevices() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) devices = JSON.parse(saved);
  } catch(e) {}
  if (devices.length === 0) {
    // Devices par défaut
    devices = [
      { name: 'ESP32-S3 #1', ip: '192.168.1.27' },
      { name: 'TinyS3 #2',   ip: '192.168.1.29' },
    ];
  }
}

function saveDevices() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(devices));
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('dev-list');
  list.innerHTML = '';

  // Bouton "Tous"
  const allSel = devices.length > 0 && selected.size === devices.length;
  const allDiv = document.createElement('div');
  allDiv.className = 'dev-item' + (allSel ? ' all-selected' : '');
  allDiv.innerHTML = `
    <div class="dev-check"></div>
    <div class="dev-info">
      <div class="dev-name">Tous (${devices.length})</div>
      <div class="dev-ip">Broadcast vers toutes les unités</div>
    </div>`;
  allDiv.onclick = () => toggleAll();
  list.appendChild(allDiv);

  // Chaque device
  devices.forEach((d, i) => {
    const isSel = selected.has(i);
    const div = document.createElement('div');
    div.className = 'dev-item' + (isSel ? ' selected' : '');
    div.innerHTML = `
      <div class="dev-check"></div>
      <div class="dev-info">
        <div class="dev-name">${d.name}</div>
        <div class="dev-ip">${d.ip}</div>
      </div>
      <div class="dev-status" id="st-${i}"></div>
      <div class="dev-actions">
        <button class="dev-btn" onclick="event.stopPropagation();pingDevice(${i})">Ping</button>
        <button class="dev-btn" onclick="event.stopPropagation();openEdit(${i})">✎</button>
      </div>`;
    div.onclick = () => toggleSelect(i);
    list.appendChild(div);
  });

  updateSelBar();
}

function updateSelBar() {
  const bar = document.getElementById('sel-bar');
  if (selected.size === 0) {
    bar.innerHTML = 'Aucune unité sélectionnée';
  } else if (selected.size === devices.length) {
    bar.innerHTML = `<span>Toutes les unités</span> (${devices.length}) sélectionnées`;
  } else {
    const names = [...selected].map(i => devices[i].name).join(', ');
    bar.innerHTML = `<span>${selected.size}</span> sélectionnée${selected.size>1?'s':''} : ${names}`;
  }
}

// ── Selection ─────────────────────────────────────────────────
function toggleSelect(i) {
  if (selected.has(i)) selected.delete(i);
  else selected.add(i);
  render();
}

function toggleAll() {
  if (selected.size === devices.length) selected.clear();
  else devices.forEach((_, i) => selected.add(i));
  render();
}

// ── Send commands ─────────────────────────────────────────────
async function sendToDevice(ip, payload) {
  try {
    const r = await fetch(`http://${ip}/cmd`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(2000)
    });
    return r.ok;
  } catch(e) { return false; }
}

async function sendToSelected(payload) {
  if (selected.size === 0) {
    alert('Sélectionne au moins une unité !');
    return;
  }
  const targets = [...selected].map(i => devices[i]);
  const results = await Promise.all(targets.map(d => sendToDevice(d.ip, payload)));
  // Mettre à jour les statuts
  [...selected].forEach((i, idx) => {
    const dot = document.getElementById(`st-${i}`);
    if (dot) {
      dot.className = 'dev-status ' + (results[idx] ? 'on' : 'err');
      setTimeout(() => { if(dot) dot.className = 'dev-status'; }, 3000);
    }
  });
}

// ── Controls ──────────────────────────────────────────────────
function setMode(m) {
  curMode = m;
  [0,1,2,3].forEach(i => {
    document.getElementById('m'+i).className = 'mb' + (i===m?' on':'');
  });
  sendToSelected({ t: 'mode', v: m });
}

function onBri(v) {
  document.getElementById('bv').textContent = v + '%';
  document.getElementById('bri').style.setProperty('--v', v + '%');
  sendToSelected({ t: 'bri', v: parseFloat((v/100).toFixed(2)) });
}

function sendBri(v) {
  const p = Math.round(v * 100);
  document.getElementById('bri').value = p;
  onBri(p);
}

function sendColor(k, h) {
  sendToSelected({ t: k, v: h });
}

// ── Ping ──────────────────────────────────────────────────────
async function pingDevice(i) {
  const dot = document.getElementById(`st-${i}`);
  if (dot) dot.className = 'dev-status';
  const ok = await sendToDevice(devices[i].ip, { t: 'bri', v: 1.0 });
  if (dot) {
    dot.className = 'dev-status ' + (ok ? 'on' : 'err');
    setTimeout(() => { if(dot) dot.className = 'dev-status'; }, 3000);
  }
}

// ── Add / Edit / Delete ───────────────────────────────────────
function addDevice() {
  const name = document.getElementById('new-name').value.trim();
  const ip   = document.getElementById('new-ip').value.trim();
  if (!name || !ip) { alert('Remplis le nom et l\'IP !'); return; }
  devices.push({ name, ip });
  saveDevices();
  document.getElementById('new-name').value = '';
  document.getElementById('new-ip').value = '';
  render();
}

function openEdit(i) {
  editIndex = i;
  document.getElementById('edit-name').value = devices[i].name;
  document.getElementById('edit-ip').value   = devices[i].ip;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editIndex = -1;
}

function saveDevice() {
  if (editIndex < 0) return;
  devices[editIndex].name = document.getElementById('edit-name').value.trim();
  devices[editIndex].ip   = document.getElementById('edit-ip').value.trim();
  saveDevices();
  closeModal();
  render();
}

function deleteDevice() {
  if (editIndex < 0) return;
  selected.delete(editIndex);
  // Réajuster les indices sélectionnés
  const newSel = new Set();
  selected.forEach(i => { if (i < editIndex) newSel.add(i); else if (i > editIndex) newSel.add(i-1); });
  selected.clear();
  newSel.forEach(i => selected.add(i));
  devices.splice(editIndex, 1);
  saveDevices();
  closeModal();
  render();
}

// ── Init ──────────────────────────────────────────────────────
loadDevices();
render();
</script>
</body>
</html>
